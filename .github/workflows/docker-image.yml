name: Build and Push Docker Image

on:
  push:
    branches: [main]
  # Build (no push) on PRs so a broken Dockerfile is caught before merge.
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Only authenticate when we intend to push (push to main).
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: buffett-bot
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/bardiejoensen/buffett-bot:latest
            ghcr.io/bardiejoensen/buffett-bot:${{ github.sha }}
