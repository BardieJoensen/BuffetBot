name: Lint, Type, Test & Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref (saves minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: buffett-bot

jobs:
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: buffett-bot/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check src/ scripts/ tests/
      - run: ruff format --check src/ scripts/ tests/

  mypy:
    name: mypy (type check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            buffett-bot/requirements.txt
            buffett-bot/requirements-dev.txt
            buffett-bot/pyproject.toml
      # Editable install: runtime deps + pinned mypy & type stubs (the [dev]
      # extra) → CI matches local exactly, and `src`/`scripts` resolve as packages.
      - run: pip install -e ".[dev]"
      - run: mypy src/ scripts/

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            buffett-bot/requirements.txt
            buffett-bot/requirements-dev.txt
            buffett-bot/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -q

  bandit:
    name: Bandit (security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: buffett-bot/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: bandit -r src/ scripts/ -c pyproject.toml

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: buffett-bot/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: detect-secrets scan --all-files --exclude-files '\.git/.*' --exclude-files '.*_cache/.*' --exclude-files '\.venv/.*' --force-use-all-plugins | tee .secrets-results.json
      - run: |
          if jq -e '.results | to_entries | map(select(.value | length > 0)) | length > 0' .secrets-results.json > /dev/null 2>&1; then
            echo "::error::Potential secrets detected! Review .secrets-results.json"
            jq '.results | to_entries[] | select(.value | length > 0)' .secrets-results.json
            exit 1
          fi
