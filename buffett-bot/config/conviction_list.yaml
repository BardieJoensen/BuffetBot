# BuffettBot Conviction List
# Businesses you'd love to own — reviewed quarterly
#
# Selection criteria:
#   - Wide or durable moat (brand, network effects, switching costs, scale, regulatory)
#   - Consistent high ROIC / ROE over 10+ years
#   - Proven management with shareholder-friendly capital allocation
#   - Business you can understand and explain in one sentence
#
# These always get priority analysis regardless of quality score.
# The system won't buy blindly — it still evaluates price vs. fair value.
# This list just says: "These are wonderful businesses. Always be watching."

last_reviewed: 2026-03-01
next_review: 2026-06-01

